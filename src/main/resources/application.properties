spring.application.name=banking-app

# =========================================================
# DATABASE CONFIGURATION
# =========================================================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# =========================================================
# JWT CONFIGURATION
# =========================================================
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration=${JWT_EXPIRATION}
app.jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION}

# =========================================================
# ADMIN ACCOUNT
# =========================================================
app.admin.email=${ADMIN_EMAIL}
app.admin.password=${ADMIN_PASSWORD}

# =========================================================
# SERVER & LOGGING
# =========================================================
server.port=8080
logging.level.com.bankapp.bankingapp=DEBUG
logging.level.org.springframework.security=DEBUG

# =========================================================
# SPRING MAIL (SMTP)
# =========================================================
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# OTP configuration
app.otp.expiration-minutes=10
app.otp.max-attempts=5

# =========================================================
# SWAGGER / OPENAPI 
# =========================================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true
springdoc.swagger-ui.filter=true
springdoc.packages-to-scan=com.bankapp.bankingapp.Api_presentation
springdoc.packages-to-exclude=com.bankapp.bankingapp.domain,com.bankapp.bankingapp.infrastructure.persistence
